name: CI/CD Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]
    types: [closed]

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ==================== develop 分支：测试 ====================
  test:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test
          DB_NAME: test_db
        run: |
          pytest tests/ -v || echo "No tests found, skipping..."

  # ==================== main 分支 PR：部署到生产服务器 ====================
  deploy-production:
    if: github.event.pull_request.merged == true && github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Tencent Cloud via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            set -e

            echo "📍 开始部署到腾讯云服务器..."

            # 配置 Git 加速代理（国内访问 GitHub）
            export GIT_PROXY_URL="https://gh-proxy.com"
            export GITHUB_REPO_URL="https://github.com/${{ github.repository }}.git"
            
            PROJECT_PATH="/opt/org-management"
            
            # 进入项目目录（首次会自动 clone）
            if [ -d "$PROJECT_PATH" ]; then
              cd $PROJECT_PATH
              echo "📂 项目目录存在，拉取最新代码..."
              git remote set-url origin ${GIT_PROXY_URL}/${GITHUB_REPO_URL}
              git fetch origin main
              git reset --hard origin/main
            else
              echo "📂 首次部署，克隆项目..."
              git clone ${GIT_PROXY_URL}/${GITHUB_REPO_URL} $PROJECT_PATH
              cd $PROJECT_PATH
              git checkout main
            fi
            
            # 恢复远程 URL
            git remote set-url origin https://github.com/${{ github.repository }}.git

            # 写入 .env 文件
            echo "⚙️  配置环境变量..."
            cat > .env <<'ENVEOF'
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT || 3306 }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            WECHAT_APPID=${{ secrets.WECHAT_APPID }}
            WECHAT_SECRET=${{ secrets.WECHAT_SECRET }}
            PORT=8080
            ENVEOF

            # 配置 Docker 镜像加速
            echo "🔧 配置 Docker 镜像加速..."
            sudo mkdir -p /etc/docker
            sudo tee /etc/docker/daemon.json > /dev/null <<'EOF'
            {
              "registry-mirrors": [
                "https://mirror.ccs.tencentyun.com",
                "https://dockerhub.icu",
                "https://docker.1ms.run"
              ]
            }
            EOF
            
            sudo systemctl daemon-reload
            sudo systemctl restart docker || true
            sleep 2

            # 停止旧容器、重新构建并启动
            echo "🔄 重启 Docker 服务..."
            docker compose down --remove-orphans || true
            docker compose build --no-cache
            
            echo "🚀 启动服务..."
            docker compose up -d

            # 等待服务就绪并验证
            echo "⏳ 等待服务就绪..."
            MAX_RETRIES=10
            for i in $(seq 1 $MAX_RETRIES); do
              sleep 3
              API_HEALTH=$(curl -sf http://localhost:8080/health 2>/dev/null || echo "unhealthy")
              echo "[$i/$MAX_RETRIES] API: $API_HEALTH"

              if [ "$API_HEALTH" = '{"status":"ok"}' ]; then
                echo "✅ 服务已就绪"
                break
              fi

              if [ "$i" = "$MAX_RETRIES" ]; then
                echo "❌ 服务超时未就绪！查看日志："
                docker compose logs api --tail=50
                exit 1
              fi
            done

            # 最终状态展示
            echo ""
            echo "========================================="
            echo "✅ 部署完成！服务已上线"
            echo "========================================="
            echo ""
            docker compose ps
            echo ""
