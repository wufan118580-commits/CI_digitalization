name: CI/CD Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]
    types: [closed]

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ==================== develop 分支：测试 ====================
  test:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test
          DB_NAME: test_db
        run: |
          pytest tests/ -v || echo "No tests found, skipping..."

  # ==================== main 分支 PR：部署到生产服务器 ====================
  deploy-production:
    if: github.event.pull_request.merged == true && github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          envs: |
            GITHUB_SHA
            PIP_INDEX_URL
        script: |
          echo "===== 开始部署生产环境 ====="
          
          # 创建项目目录
          sudo mkdir -p /opt/org-management
          sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /opt/org-management
          
          # 复制代码到服务器
          cd /opt/org-management
          
          # 使用 rsync 同步代码（或 git clone）
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/org-management/ . 2>/dev/null || true
          
          # 克隆最新代码
          git clone --depth 1 https://github.com/${{ github.repository }}.git /tmp/org-management-latest
          cp -r /tmp/org-management-latest/. /opt/org-management/
          rm -rf /tmp/org-management-latest
          
          cd /opt/org-management
          
          # 配置 Docker（清华源加速 + 腾讯云内网镜像）
          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json <<'EOF'
          {
            "registry-mirrors": [
              "https://mirror.ccs.tencentyun.com",
              "https://pypi.tuna.tsinghua.edu.cn"
            ]
          }
          EOF
          
          sudo systemctl daemon-reload
          sudo systemctl restart docker || true
          
          # 构建 Docker 镜像（使用清华源）
          docker build \
            --build-arg PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple \
            --build-arg PIP_TRUSTED_HOST=pypi.tuna.tsinghua.edu.cn \
            -t org-management:prod .
          
          # 停止并删除旧容器
          docker stop org-management-prod || true
          docker rm org-management-prod || true
          
          # 启动新容器
          docker run -d \
            --name org-management-prod \
            --restart always \
            -p 8080:8080 \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            -e WECHAT_APPID=${{ secrets.WECHAT_APPID }} \
            -e WECHAT_SECRET=${{ secrets.WECHAT_SECRET }} \
            org-management:prod
          
          # 验证部署
          sleep 5
          if docker ps | grep -q org-management-prod; then
            echo "===== 部署成功 ====="
            curl -s http://localhost:8080/health || true
          else
            echo "===== 部署失败 ====="
            docker logs org-management-prod
            exit 1
          fi

  # ==================== develop 推送：部署到预发布服务器 ====================
  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            echo "===== 开始部署预发布环境 ====="
            
            # 创建项目目录
            sudo mkdir -p /opt/org-management-staging
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /opt/org-management-staging
            
            # 克隆代码
            cd /opt/org-management-staging
            git clone --depth 1 https://github.com/${{ github.repository }}.git . 2>/dev/null || git pull origin develop
            
            # 配置 Docker
            sudo mkdir -p /etc/docker
            sudo tee /etc/docker/daemon.json <<'EOF'
            {
              "registry-mirrors": [
                "https://mirror.ccs.tencentyun.com",
                "https://pypi.tuna.tsinghua.edu.cn"
              ]
            }
            EOF
            
            sudo systemctl daemon-reload
            sudo systemctl restart docker || true
            
            # 构建并启动
            docker build \
              --build-arg PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple \
              --build-arg PIP_TRUSTED_HOST=pypi.tuna.tsinghua.edu.cn \
              -t org-management:staging .
            
            docker stop org-management-staging || true
            docker rm org-management-staging || true
            
            docker run -d \
              --name org-management-staging \
              --restart always \
              -p 8081:8080 \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              -e WECHAT_APPID=${{ secrets.WECHAT_APPID }} \
              -e WECHAT_SECRET=${{ secrets.WECHAT_SECRET }} \
              org-management:staging
            
            echo "===== 预发布部署完成 ====="
            curl -s http://localhost:8081/health || true
